<!DOCTYPE html>
<html>
<head>
  <title>TikTok AI Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #0f0f14;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: linear-gradient(135deg, #ff0050, #7b61ff);
      color: white;
      font-weight: bold;
    }

    video {
      width: 100%;
      margin-top: 15px;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h2>🎬 TikTok AI Generator</h2>

<input type="file" id="image" accept="image/*">

<select id="angle">
  <option>Talking</option>
  <option>Aesthetic</option>
  <option>Problem-Solution</option>
</select>

<button onclick="generate()">Generate Video</button>

<p id="status"></p>
<video id="video" controls></video>
<pre id="script"></pre>

<script>
async function generate() {
  const file = document.getElementById("image").files[0];
  const angle = document.getElementById("angle").value;

  if (!file) {
    alert("Upload image first");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function () {
    const base64Image = reader.result;

    document.getElementById("status").innerText = "Generating...";

    const res = await fetch("/api/generate.js", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        image: base64Image,
        angle: angle,
        duration: "15"
      })
    });

    const data = await res.json();

    document.getElementById("script").innerText = data.script;

    if (data.videoUrl) {
      document.getElementById("video").src = data.videoUrl;
      document.getElementById("status").innerText = "Done!";
    } else {
      document.getElementById("status").innerText = "Processing video...";
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
