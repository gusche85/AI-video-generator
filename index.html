<!DOCTYPE html>
<html>
<head>
  <title>AI Video Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #0f0f14;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      background: purple;
      color: white;
    }

    video {
      width: 100%;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<h2>🎬 AI Video Generator</h2>

<input id="input" placeholder="Paste TikTok link here...">

<select id="angle">
  <option>Talking</option>
  <option>Aesthetic</option>
  <option>Problem-Solution</option>
</select>

<button onclick="generate()">Generate</button>

<p id="status"></p>

<video id="video" controls></video>
<pre id="script"></pre>

<script>
async function generate() {
  const input = document.getElementById("input").value;
  const angle = document.getElementById("angle").value;

  document.getElementById("status").innerText = "Processing...";

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      input,
      angle,
      duration: "15s"
    })
  });

  const data = await res.json();

  document.getElementById("script").innerText = data.script;

  if (data.videoUrl) {
    document.getElementById("video").src = data.videoUrl;
    document.getElementById("status").innerText = "Done!";
  } else {
    document.getElementById("status").innerText = "Video processing...";
  }
}
</script>

</body>
</html>
